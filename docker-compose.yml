services:
  xpay-expert-api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: xpay-expert-api

    ports:
      - "127.0.0.1:3002:8085"

    env_file:
      - .env

    restart: unless-stopped

    init: true

    mem_limit: 640m
    cpus: "1.0"

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8085/api/health').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      - xpay-expert-network

networks:
  xpay-expert-network:
    name: xpay-expert-network
